services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: ${DATABASE_URL:-./data/invoices.db}
      UPLOADS_DIR: ${UPLOADS_DIR:-./uploads}
      API_PORT: 3001
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      DB_DRIVER: ${DB_DRIVER:-sqlite}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - api_data:/app/apps/api/data
      - api_uploads:/app/apps/api/uploads

  webapp:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      api:
        condition: service_healthy
      webapp:
        condition: service_healthy
    environment:
      PUBLIC_IP: ${PUBLIC_IP:-}
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - nginx_certs:/etc/nginx/certs

volumes:
  api_data:
  api_uploads:
  nginx_certs:
